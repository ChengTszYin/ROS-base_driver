controller_frequency: 5.0
recovery_behavior_enabled: true
clearing_rotation_allowed: true

TebLocalPlannerROS:
  # Robot configuration
  acc_lim_x: 1.2
  acc_lim_y: 0.0
  acc_lim_theta: 1.5
  max_vel_x: 0.2
  max_vel_x_backwards: 0.0
  max_vel_y: 0.0
  max_vel_theta: 0.8
  min_vel_theta: -0.0
  min_in_place_vel_theta: 0.2
  holonomic_robot: false
  escape_vel: -0.05

  # Goal tolerance
  xy_goal_tolerance: 1.0      # Tightened from 0.2 for precise position reaching
  yaw_goal_tolerance: 0.2
  free_goal_vel: true         # Allows rotation after reaching (x, y) goal
  two_step_control: true      # Explicitly prioritize position then orientation

  # Trajectory configuration
  dt_ref: 0.3
  dt_hysteresis: 0.1
  max_global_plan_lookahead_dist: 3.0
  global_plan_overwrite_orientation: true
  global_plan_viapoint_sep: 0.05  # Reduced from 0.1 for tighter path adherence
  max_samples: 500
  allow_init_with_backwards_motion: false

  # Obstacle avoidance
  min_obstacle_dist: 0.01
  inflation_dist: 0.05
  include_costmap_obstacles: true
  costmap_obstacles_behind_robot_dist: 1.0
  obstacle_poses_affected: 25
  legacy_obstacle_association: false

  # Optimization
  no_inner_iterations: 5
  no_outer_iterations: 4
  optimization_activate: true
  optimization_verbose: false
  penalty_epsilon: 0.1
  weight_max_vel_x: 1.5
  weight_max_vel_theta: 1.2
  weight_acc_lim_x: 1.0
  weight_acc_lim_theta: 1.0
  weight_kinematics_nh: 1000.0
  weight_kinematics_forward_drive: 0.3  # Further reduced from 0.5 to minimize forward motion during rotation
  weight_optimaltime: 1.0
  weight_obstacle: 50.0
  weight_inflation: 0.1
  weight_dynamic_obstacle: 10.0
  weight_viapoint: 2.0          # Increased from 1.0 to prioritize reaching (x, y) waypoints

  # Homotopy Class Planner
  enable_homotopy_class_planning: false
  enable_multithreading: true
  simple_exploration: false
  selection_cost_hysteresis: 1.0
  selection_obst_cost_scale: 1.0
  selection_alternative_time_cost: false

  # Recovery
  oscillation_recovery: true
  oscillation_v_eps: 0.1
  oscillation_omega_eps: 0.1
  oscillation_recovery_min_duration: 10.0
  oscillation_filter_duration: 10.0